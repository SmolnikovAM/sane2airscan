name: Build Nix artifact

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  nixos-artifact:
    name: Build x86_64-linux Nix closure
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build package
        run: |
          set -euo pipefail
          test "${GITHUB_REF_TYPE}" = "tag"
          release_tag="${GITHUB_REF_NAME}"
          case "$release_tag" in
            v*) ;;
            *) echo "release tag must start with v: $release_tag" >&2; exit 1 ;;
          esac

          RELEASE_TAG="$release_tag" \
            nix-build -E 'with import <nixpkgs> {}; callPackage ./packages/xerox-airscan-bridge { version = builtins.getEnv "RELEASE_TAG"; }'

          reported_version="$(./result/bin/xerox-airscan-bridge --version)"
          test "$reported_version" = "xerox-airscan-bridge $release_tag"

      - name: Export Nix store closure
        run: |
          set -euo pipefail

          mkdir -p dist
          mkdir -p release
          store_path="$(readlink -f result)"
          binary_path="$store_path/bin/xerox-airscan-bridge"
          release_tag="${GITHUB_REF_NAME}"
          artifact_name="xerox-airscan-bridge-${release_tag}-nixos-x86_64"

          nix-store -qR "$store_path" | sort -u > dist/nix-store-paths.txt
          printf '%s\n' "$binary_path" > dist/binary-path.txt
          printf '%s\n' "$release_tag" > dist/version.txt

          nix-store --export $(cat dist/nix-store-paths.txt) \
            | xz -T0 -9 \
            > dist/xerox-airscan-bridge-x86_64-linux.nix-store-closure.nar.xz

          sha256sum \
            dist/xerox-airscan-bridge-x86_64-linux.nix-store-closure.nar.xz \
            dist/nix-store-paths.txt \
            dist/binary-path.txt \
            dist/version.txt \
            > dist/SHA256SUMS

          cat > dist/README-nixos-artifact.md <<'EOF'
          # Xerox AirScan Bridge NixOS Artifact

          This artifact contains a Nix store closure for x86_64-linux.

          Import it on a NixOS host:

          ```bash
          xz -dc xerox-airscan-bridge-x86_64-linux.nix-store-closure.nar.xz | sudo nix-store --import
          binary_path="$(cat binary-path.txt)"
          "$binary_path" --help
          "$binary_path" --version
          ```

          Prefer the repository NixOS module for permanent installation.
          EOF

          mkdir -p "release/$artifact_name"
          cp dist/* "release/$artifact_name/"
          tar -C release -czf "release/$artifact_name.tar.gz" "$artifact_name"
          sha256sum "release/$artifact_name.tar.gz" > "release/$artifact_name.tar.gz.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xerox-airscan-bridge-nixos-x86_64-linux
          path: release/
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Xerox AirScan Bridge ${{ github.ref_name }}
          body: |
            NixOS x86_64 release build for `xerox-airscan-bridge`.

            Download `xerox-airscan-bridge-${{ github.ref_name }}-nixos-x86_64.tar.gz`,
            unpack it on a NixOS host, and follow `README-nixos-artifact.md`.

            The binary reports:

            ```text
            xerox-airscan-bridge ${{ github.ref_name }}
            ```
          files: |
            release/xerox-airscan-bridge-${{ github.ref_name }}-nixos-x86_64.tar.gz
            release/xerox-airscan-bridge-${{ github.ref_name }}-nixos-x86_64.tar.gz.sha256
